<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>신규 프랜차이즈 가맹점 확인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.min.css" />
    <style>
        .hidden { display: none; }
    </style>
</head>
<body>
    <header>
        <h1>신규 가맹점 확인</h1>
        <div style="display: flex; align-items: center; column-gap: 1rem;">
            <div style="flex-shrink: 0;">인허가일 ~부터:</div>
            <input style="margin: 0 !important; max-width: 250px;" id="fromDate" type="date" />
        </div>
        <div style="display: flex; align-items: center; column-gap: 1rem;">
            <div style="flex-shrink: 0;">인허가일 ~까지:</div>
            <input style="margin: 0 !important; max-width: 250px;" id="toDate" type="date" />
        </div>
        <br />
        <div style="display: flex; align-items: center; column-gap: 1rem;">
            <button id="getStores">음식점 목록 확인</button>
            <button id="getFCStores">FC 가맹점 추정 목록 확인</button>
            <button id="copyTable">아래 테이블을 클립보드로 복사</button>
        </div>
        <br />
        <div>📢: <span id="msg">인허가일 입력 후, 위쪽 "음식점 목록 확인" 버튼을 클릭하세요</span></div>
    </header>
    <hr />
    <div style="width: 100%; overflow-x: auto;">
        <table id="result"></table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.20/dayjs.min.js"></script>
    <script type="module">
        // @ts-check
        // 음식점 목록 확인 코드

        import dayjs from "https://cdn.skypack.dev/pin/dayjs@v1.11.20-vobnFa3JiZEuF7RQG8va/mode=imports,min/optimized/dayjs.js";

        const $getStores = /** @type { HTMLButtonElement } */ (document.getElementById("getStores"));
        const $fromDate = /** @type { HTMLInputElement } */ (document.getElementById("fromDate"));
        const $toDate = /** @type { HTMLInputElement } */ (document.getElementById("toDate"));
        const $msg = /** @type { HTMLSpanElement } */ (document.getElementById("msg"));
        const $result = /** @type { HTMLTableElement } */ (document.getElementById("result"));
        const $copyTable = /** @type { HTMLButtonElement } */ (document.getElementById("copyTable"));

        const apiurls = new Array(2);
        apiurls[0] = `https://apis.data.go.kr/1741000/rest_cafes/info`;
        apiurls[1] = `https://apis.data.go.kr/1741000/general_restaurants/info`;

        /** @type { (url: string, page: number) => Promise<{ [key: string]: string }[] | null> } */
        async function fetchDate(url, page) {
            const params = {
                serviceKey: `bULxrI/6yhWWqS44S0F3qc+uxnDKpzAJkQYzwWmri3eVaSBMSPujbdfT/yoeVq7IRgUPrpuImk1q7WRyRtNZbA==`,
                numOfRows: "100",
                pageNo: page.toString(),
                ["cond[LCPMT_YMD::GTE]"]: $fromDate.value.replace("-", ""),
                ["cond[LCPMT_YMD::LT]"]: $toDate.value.replace("-", ""),
            };
            const queryString = new URLSearchParams(params).toString();
            const fullUrl = `${ url }?${ queryString }`;

            const json = await (await fetch(fullUrl)).json();
            const items = /** @type { { [key: string]: string }[] | undefined } */ (json?.response?.body?.items?.item);
        
            return (items !== undefined) ? items : null;
        }
        $getStores.addEventListener("click", async (e) => {
            if (!$fromDate.value || !$toDate.value) {
                $msg.textContent = "인허가 날짜를 제대로 입력해야 합니다.";
                return;
            }
            let diff = dayjs($toDate.value).diff($fromDate.value, "month"); 
            if (diff > 12) {
                $msg.textContent = "인허가 날짜의 '월' 차이는 12개월을 초과할 수 없습니다.";
                return;
            }
            diff = dayjs($toDate.value).diff($fromDate.value, "day");
            if (diff <= 0) {
                $msg.textContent = "인허가 시작 날짜가 종료 날짜보다 작거나 같을 수는 없습니다.";
                return;
            }

            for (const apiurl of apiurls) {
                let page = 1;
                while (true) {
                    const items = await fetchDate(apiurl, page++);
                    if (!items) break;
                }

                if ($result.querySelectorAll("tr").length === 0) {
                    $result.insertAdjacentHTML(`beforeend`,
                        `<tr>
                            <td>개방자치단체코드</td>
                            <td>관리번호</td>
                            <td>건물소유구분명</td>
                            <td>공장사무직직원수</td>
                            <td>공장생산직직원수</td>
                            <td>공장판매직직원수</td>
                            <td>급수시설구분명</td>
                            <td>남성종사자수</td>
                            <td>다중이용업소여부</td>
                            <td>데이터갱신구분</td>
                            <td>데이터갱신시점(YYYYMMDDHHMMSS)</td>
                            <td>도로명우편번호</td>
                            <td>도로명주소</td>
                            <td>등급구분명</td>
                            <td>보증액</td>
                            <td>본사직원수</td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td>OPN_ATMY_GRP_CD</td>
                            <td>MNG_NO</td>
                            <td>BLDG_PSN_SE_NM</td>
                            <td>FCTRY_OFJB_EMP_CNT</td>
                            <td>FCTRY_PRODWK_EMP_CNT</td>
                            <td>FCTRY_SLSPOS_EMP_CNT</td>
                            <td>WTRSPPL_FCLT_SE_NM</td>
                            <td>ML_PRCTR_CNT</td>
                            <td>MLT_UTZTN_BSNSSP_YN</td>
                            <td>DAT_UPDT_SE</td>
                            <td>DAT_UPDT_PNT</td>
                            <td>ROAD_NM_ZIP</td>
                            <td>ROAD_NM_ADDR</td>
                            <td>GRD_SE_NM</td>
                            <td>GRNAMT</td>
                            <td>HDOFC_EMP_CNT</td>
                            <td>BPLC_NM</td>
                            <td>DTL_SALS_STTS_NM</td>
                            <td>DTL_SALS_STTS_CD</td>
                            <td>LCTN_AREA</td>
                            <td>FCLT_TOTAL_SCL</td>
                            <td>BZSTAT_SE_NM</td>
                            <td>FML_PRCTR_CNT</td>
                            <td>SALS_STTS_NM</td>
                            <td>SALS_STTS_CD</td>
                            <td>BIZPLC_SURRND_SE_NM</td>
                            <td>MRNT_AMOUNT</td>
                            <td>SNTTN_BZSTAT_NM</td>
                            <td>LCPMT_YMD</td>
                            <td>TRDTN_BSNSSP_PRINC_FD</td>
                            <td>TRDTN_BSNSSP_DSGN_NO</td>
                            <td>TELNO</td>
                            <td>CRD_INFO_X</td>
                            <td>CRD_INFO_Y</td>
                            <td>LOTNO_ADDR</td>
                            <td>CLSBIZ_YMD</td>
                            <td>HPG</td>
                            <td>LCTN_ZIP</td>
                            <td>LAST_MDFCN_PNT</td>
                        </tr>`
                    );
                }
            }
        });



        
    </script>
</body>
</html>
